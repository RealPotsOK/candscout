services:
  live-sim:
    build:
      context: ..
      dockerfile: live_sim/Dockerfile
    env_file:
      - env/active.env
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    gpus: all
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "${HOST_PORT:-8080}:8080"
    volumes:
      - ./state:/app/state
      - ./app:/app/app:ro
      - ../src:/app/src:ro
    restart: always
